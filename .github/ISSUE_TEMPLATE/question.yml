name: Question
description: Ask a usage or integration question.
title: "[question] "
labels: ["question", "needs-triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include tracker, install path, and any relevant config or command output.

