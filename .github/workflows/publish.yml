name: Publish

# Publishes ztrack to npm when an exact version tag (vX.Y.Z) is pushed.
# The npm token lives once as the repo secret NPM_TOKEN — no local token needed.
# Release flow: bump package.json + CHANGELOG, commit, then
#   git tag v0.2.1 && git push origin v0.2.1
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  id-token: write # enables npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json version ${PKG}"
            exit 1
          fi
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
