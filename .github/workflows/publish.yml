name: Publish

# Publishes ztrack to npm when an exact version tag (vX.Y.Z) is pushed.
# The npm token lives once as the repo secret NPM_TOKEN — no local token needed.
# Release flow: bump package.json + CHANGELOG, commit, then
#   git tag v0.2.1 && git push origin v0.2.1
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  id-token: write # enables npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json version ${PKG}"
            exit 1
          fi
      - name: Typecheck
        run: bun run typecheck
      - name: Build package
        # Build BEFORE tests: the black-box e2e tests symlink the repo as node_modules/ztrack and
        # the installed preset resolves `ztrack/preset-kit` to dist/, so dist must exist first.
        run: npm run build:node-cli
      - name: Test
        run: bun test
      - name: Fresh project dry run
        # Gate the release on the REAL consumer path: pack, install into fresh repos, and
        # run init -> check across every preset (plus MCP/SDK/autonomy). typecheck + bun
        # test above never exercise an INSTALLED package, so they can't catch an install
        # that fails to load — which is exactly how 0.3.0 shipped broken. This can.
        run: bash demos/fresh-project-dry-run.sh
      - name: Check rule behaviors (real CLI e2e)
        # The shipped check path: the generic preset's rules fire (and stay quiet) correctly
        # through the installed CLI — the behaviors presetKit.test.ts used to assert in-process.
        run: bash demos/check-e2e.sh
      - name: Loop gate (Stop hook + waiver, no live agent)
        # Also on the release gate: the installed package's Stop hook + `ztrack waiver`
        # CLI round-trip, driven deterministically (no model calls).
        run: bash demos/loop-gate-ci.sh
      - name: Package-manager matrix (pnpm / yarn / PnP / bun)
        # Gate the release on the resolution layouts npm doesn't exercise — this is how the
        # require(esm) break (Node 20 / PnP) and the unexported package.json would be caught.
        run: bash demos/pm-matrix.sh
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
