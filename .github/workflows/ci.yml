name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Build package
        run: npm run build:node-cli
      - name: Pack smoke
        run: npm pack --dry-run
      - name: Fresh project dry run
        run: bash demos/fresh-project-dry-run.sh
      - name: Check rule behaviors (real CLI e2e)
        run: bash demos/check-e2e.sh
      - name: Loop gate (Stop hook + waiver, no live agent)
        run: bash demos/loop-gate-ci.sh
      - name: Export smoke
        run: |
          node --input-type=module -e "const paths=['ztrack','ztrack/config','ztrack/sdk','ztrack/check','ztrack/export','ztrack/markdown-model','ztrack/ac-version','ztrack/presets','ztrack/preset-kit','ztrack/mutate','ztrack/mcp','ztrack/attest','ztrack/lint','ztrack/tx','ztrack/dsse']; for (const p of paths) await import(p);"
      - name: Internal subpath smoke
        run: |
          node --input-type=module -e "const blocked=['ztrack/presets/default','ztrack/presets/genericRuntime']; for (const p of blocked) { try { await import(p); throw new Error(p+' unexpectedly imported'); } catch (error) { if (error.code !== 'ERR_PACKAGE_PATH_NOT_EXPORTED') throw error; } }"
