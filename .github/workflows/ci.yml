name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Typecheck visualizer client
        run: |
          (cd visualizer && bun install --silent)
          bunx tsc --noEmit -p visualizer/tsconfig.json
      - name: Build package
        # Build BEFORE tests: the black-box e2e tests symlink the repo as node_modules/ztrack and
        # the installed preset resolves `ztrack/preset-kit` to dist/, so dist must exist first.
        run: npm run build:node-cli
      - name: Test
        run: bun test
      - name: Pack smoke
        run: npm pack --dry-run
      - name: Fresh project dry run
        run: bash demos/fresh-project-dry-run.sh
      - name: Check rule behaviors (real CLI e2e)
        run: bash demos/check-e2e.sh
      - name: Missing-peer gate (real, non-mocked CLI e2e for the optional twin peers)
        run: bash demos/missing-peer-gate.sh
      - name: Loop gate (Stop hook + waiver, no live agent)
        run: bash demos/loop-gate-ci.sh
      - name: Import backlog (freeform -> native document source e2e)
        run: bash demos/import-backlog-demo.sh
      - name: "Visualizer mod (DOM-rendered custom board: status column + AC-unit label + theme + code panel)"
        run: |
          (cd visualizer && bun install --silent)
          bash demos/visualizer-mod.sh
      - name: Export smoke (the public surface resolves)
        run: |
          node --input-type=module -e "const paths=['ztrack','ztrack/sdk','ztrack/check','ztrack/preset-kit','ztrack/world-annotations','ztrack/world-source-books']; for (const p of paths) await import(p);"
      - name: Internal subpath smoke (formerly-public internals are NOT exported)
        run: |
          node --input-type=module -e "const blocked=['ztrack/mcp','ztrack/lint','ztrack/tx','ztrack/attest','ztrack/dsse','ztrack/export','ztrack/config','ztrack/markdown-model','ztrack/ac-version','ztrack/presets','ztrack/presets/default']; for (const p of blocked) { try { await import(p); throw new Error(p+' unexpectedly imported'); } catch (error) { if (error.code !== 'ERR_PACKAGE_PATH_NOT_EXPORTED') throw error; } }"

  # Resolution layouts npm's flat node_modules doesn't exercise: pnpm strict store, yarn
  # classic, yarn Berry/PnP, bun. Parallel to `test` so it doesn't slow the critical path.
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: bun install --frozen-lockfile
      - name: Package-manager matrix (pnpm / yarn / PnP / bun)
        run: bash demos/pm-matrix.sh
