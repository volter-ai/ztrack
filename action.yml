# Consumers:
#   - uses: volter-ai/ztrack@v0      (moving major tag; or pin an exact vX.Y.Z)
# Runs `ztrack check` as a PR gate: checked ACs must cite evidence that verifies,
# or the job fails.
name: ztrack-check
description: Run ztrack as a CI gate
inputs:
  working-directory:
    description: Directory containing the .volter tracker config
    default: .
  root:
    description: >
      Path to a committed validated root (the JSON written by `ztrack export`,
      shape { "issues": [ ... ] }). When set, ztrack validates this root with
      --verify-commits instead of reading a live tracker. Recommended for CI
      because a fresh checkout does not preserve the local tracker store. (If you
      have an old `.volter/snapshot.json` from a previous ztrack version, re-run
      `ztrack export` to regenerate it as a validated root.)
    default: ''
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        AP="$GITHUB_ACTION_PATH"
        # The bundled CLI is not committed; run ztrack from source via Bun.
        # (A pinned tag that still ships dist/cli.js is used directly.)
        if [ -f "$AP/dist/cli.js" ]; then
          ZTRACK=(bun "$AP/dist/cli.js")
        else
          [ -d "$AP/node_modules" ] || (cd "$AP" && bun install --frozen-lockfile >/dev/null)
          ZTRACK=(bun "$AP/src/cli.ts")
        fi
        if [ -n "${{ inputs.root }}" ]; then
          # Safe path: validate a committed root; the repo's preset.mts is NOT executed.
          "${ZTRACK[@]}" check --input "${{ inputs.root }}" --verify-commits
        else
          if [ ! -f .volter/tracker-config.json ]; then
            echo "No .volter/tracker-config.json found. Run 'npx ztrack init' locally, commit the config, and prefer a committed validated root (ztrack export) for CI." >&2
            exit 2
          fi
          # SECURITY: this path executes the repo's .volter/tracker/validation/preset.mts.
          # On fork-PR events that is untrusted code on your runner — prefer the `root`
          # input (a committed validated root) for pull_request_target / fork PRs.
          echo "::warning title=ztrack::Live 'ztrack check' executes this repo's validation preset (preset.mts). For untrusted/fork PRs, pass the 'root' input (a committed validated root) instead."
          "${ZTRACK[@]}" check
        fi
