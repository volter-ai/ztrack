# Consumers:
#   - uses: volter-ai/ztrack@v0      (moving major tag; or pin an exact vX.Y.Z)
# Runs `ztrack check` as a PR gate: checked ACs must cite evidence that verifies,
# or the job fails.
name: ztrack-check
description: Run ztrack as a CI gate
inputs:
  working-directory:
    description: Directory containing the .volter tracker config
    default: .
  snapshot:
    description: >
      Path to a committed exported snapshot to gate. When set, ztrack validates
      this snapshot with --verify-commits instead of exporting a live tracker.
      This is recommended for CI because a fresh checkout does not preserve the
      local tracker store.
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        ZTRACK=(node "$GITHUB_ACTION_PATH/dist/cli.js")
        if [ -n "${{ inputs.snapshot }}" ]; then
          "${ZTRACK[@]}" check --input "${{ inputs.snapshot }}" --verify-commits
        else
          if [ ! -f .volter/tracker-config.json ]; then
            echo "No .volter/tracker-config.json found. Run 'npx ztrack init' locally, commit the config, and prefer a committed snapshot for CI." >&2
            exit 2
          fi
          "${ZTRACK[@]}" check
        fi
